<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All AI Tools — AIDirectory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="dot"></div>
      AIDirectory
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="tools.html" class="active">All Tools</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="index.html#submit" class="nav-cta">Submit Tool</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <div class="hero-glow"></div>
    <h1>Explore All AI Tools</h1>
    <p>Browse our complete database of AI-powered solutions.</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    
    <!-- CATEGORY FILTERS -->
    <div class="categories" id="tool-filters" style="margin-bottom: 40px;">
      <button class="filter-btn active" data-cat="All">All Tools</button>
      <button class="filter-btn" data-cat="Chatbot">Chatbots</button>
      <button class="filter-btn" data-cat="Image Generation">Image</button>
      <button class="filter-btn" data-cat="Writing">Writing</button>
      <button class="filter-btn" data-cat="Coding">Coding</button>
      <button class="filter-btn" data-cat="Audio">Audio</button>
      <button class="filter-btn" data-cat="Video">Video</button>
      <button class="filter-btn" data-cat="Productivity">Productivity</button>
      <button class="filter-btn" data-cat="Search">Search</button>
    </div>

    <!-- GRID CONTAINER -->
    <div class="tools-grid" id="tools-grid">
      <!-- Tools will be injected here by JavaScript -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <div class="logo">AIDirectory</div>
      <p>© 2026 AIDirectory. All rights reserved.</p>
    </div>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="tools.html">Tools</a></li>
      <li><a href="blog.html">Blog</a></li>
    </ul>
  </footer>

  <script src="app.js"></script>
  <script>
    /**
     * Initialization: Wait for data before rendering
     */
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Wait for the tools.json fetch in app.js to finish
      await loadTools(); 
      
      // 2. Initial render of all tools once data is present[cite: 3, 6]
      renderTools('All');
      
      // 3. Set up button click listeners
      setupFilters();
    });

    /**
     * Renders cards to the tools-grid div[cite: 1, 6]
     */
    function renderTools(filter = 'All') {
      const grid = document.getElementById('tools-grid');
      
      // Filter tools based on category[cite: 3, 7]
      const filtered = filter === 'All' 
        ? tools 
        : tools.filter(t => t.category === filter);
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 60px;">
            <h3>No tools found in "${filter}"</h3>
            <p>We are constantly adding new tools. Check back soon!</p>
          </div>`;
        return;
      }

      // Use the createCard function from app.js
      grid.innerHTML = filtered.map((t, i) => createCard(t, i)).join('');
    }

    /**
     * Handles filter button interactions[cite: 3]
     */
    function setupFilters() {
      const buttons = document.querySelectorAll('.filter-btn');
      
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          // Update active UI state
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // Re-render grid with new filter[cite: 3]
          renderTools(btn.dataset.cat);
          
          // Smooth scroll to top of grid on mobile
          window.scrollTo({ top: 200, behavior: 'smooth' });
        });
      });
    }
  </script>
</body>
</html>
